<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E293B" />
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.95" />
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.95" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#7C3AED" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="520" fill="url(#bgGrad)" rx="16" />

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="520" stroke="#6366F1" stroke-width="0.5" />
    <line x1="100" y1="0" x2="100" y2="520" stroke="#6366F1" stroke-width="0.5" />
    <line x1="200" y1="0" x2="200" y2="520" stroke="#6366F1" stroke-width="0.5" />
    <line x1="300" y1="0" x2="300" y2="520" stroke="#6366F1" stroke-width="0.5" />
    <line x1="400" y1="0" x2="400" y2="520" stroke="#6366F1" stroke-width="0.5" />
    <line x1="500" y1="0" x2="500" y2="520" stroke="#6366F1" stroke-width="0.5" />
    <line x1="600" y1="0" x2="600" y2="520" stroke="#6366F1" stroke-width="0.5" />
    <line x1="700" y1="0" x2="700" y2="520" stroke="#6366F1" stroke-width="0.5" />
    <line x1="800" y1="0" x2="800" y2="520" stroke="#6366F1" stroke-width="0.5" />
    <line x1="900" y1="0" x2="900" y2="520" stroke="#6366F1" stroke-width="0.5" />
    <line x1="1000" y1="0" x2="1000" y2="520" stroke="#6366F1" stroke-width="0.5" />
    <line x1="0" y1="0" x2="1000" y2="0" stroke="#6366F1" stroke-width="0.5" />
    <line x1="0" y1="100" x2="1000" y2="100" stroke="#6366F1" stroke-width="0.5" />
    <line x1="0" y1="200" x2="1000" y2="200" stroke="#6366F1" stroke-width="0.5" />
    <line x1="0" y1="300" x2="1000" y2="300" stroke="#6366F1" stroke-width="0.5" />
    <line x1="0" y1="400" x2="1000" y2="400" stroke="#6366F1" stroke-width="0.5" />
    <line x1="0" y1="500" x2="1000" y2="500" stroke="#6366F1" stroke-width="0.5" />
  </g>

  <!-- Section Title -->
  <text x="500" y="45" text-anchor="middle" fill="#CBD5E1" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" letter-spacing="0.5">What I Build</text>
  <rect x="440" y="55" width="120" height="2" rx="1" fill="url(#accent1)" />

  <!-- Card 1: Mobile Apps -->
  <g filter="url(#cardShadow)">
    <rect x="30" y="80" width="290" height="120" rx="10" fill="url(#cardGrad1)" stroke="#7C3AED" stroke-width="0.5" stroke-opacity="0.3" />
    <rect x="30" y="80" width="4" height="120" rx="2" fill="url(#accent1)" />
    <text x="50" y="112" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">Mobile Apps</text>
    <text x="50" y="134" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">Android &amp; iOS apps with Flutter</text>
    <text x="50" y="152" fill="#64748B" font-family="system-ui, sans-serif" font-size="11">Cross-platform · Single codebase</text>
    <circle cx="280" cy="98" r="3" fill="#22D3EE" opacity="0.6" />
  </g>

  <!-- Card 2: UI Engineering -->
  <g filter="url(#cardShadow)">
    <rect x="355" y="80" width="290" height="120" rx="10" fill="url(#cardGrad2)" stroke="#7C3AED" stroke-width="0.5" stroke-opacity="0.3" />
    <rect x="355" y="80" width="4" height="120" rx="2" fill="url(#accent2)" />
    <text x="375" y="112" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">UI Engineering</text>
    <text x="375" y="134" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">Clean, responsive interfaces</text>
    <text x="375" y="152" fill="#64748B" font-family="system-ui, sans-serif" font-size="11">Pixel-perfect · Accessible design</text>
    <circle cx="605" cy="98" r="3" fill="#22D3EE" opacity="0.6" />
  </g>

  <!-- Card 3: API Integration -->
  <g filter="url(#cardShadow)">
    <rect x="680" y="80" width="290" height="120" rx="10" fill="url(#cardGrad1)" stroke="#7C3AED" stroke-width="0.5" stroke-opacity="0.3" />
    <rect x="680" y="80" width="4" height="120" rx="2" fill="url(#accent1)" />
    <text x="700" y="112" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">API Integration</text>
    <text x="700" y="134" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">REST APIs, auth, backend services</text>
    <text x="700" y="152" fill="#64748B" font-family="system-ui, sans-serif" font-size="11">Dio · Error handling · Caching</text>
    <circle cx="930" cy="98" r="3" fill="#22D3EE" opacity="0.6" />
  </g>

  <!-- Card 4: Firebase -->
  <g filter="url(#cardShadow)">
    <rect x="30" y="220" width="290" height="120" rx="10" fill="url(#cardGrad2)" stroke="#7C3AED" stroke-width="0.5" stroke-opacity="0.3" />
    <rect x="30" y="220" width="4" height="120" rx="2" fill="url(#accent2)" />
    <text x="50" y="252" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">Firebase</text>
    <text x="50" y="274" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">Auth, database, storage, cloud</text>
    <text x="50" y="292" fill="#64748B" font-family="system-ui, sans-serif" font-size="11">Firestore · Functions · Hosting</text>
    <circle cx="280" cy="238" r="3" fill="#22D3EE" opacity="0.6" />
  </g>

  <!-- Card 5: State Management -->
  <g filter="url(#cardShadow)">
    <rect x="355" y="220" width="290" height="120" rx="10" fill="url(#cardGrad1)" stroke="#7C3AED" stroke-width="0.5" stroke-opacity="0.3" />
    <rect x="355" y="220" width="4" height="120" rx="2" fill="url(#accent1)" />
    <text x="375" y="252" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">State Management</text>
    <text x="375" y="274" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">Scalable logic with Riverpod</text>
    <text x="375" y="292" fill="#64748B" font-family="system-ui, sans-serif" font-size="11">Provider · Bloc · Clean architecture</text>
    <circle cx="605" cy="238" r="3" fill="#22D3EE" opacity="0.6" />
  </g>

  <!-- Card 6: Performance -->
  <g filter="url(#cardShadow)">
    <rect x="680" y="220" width="290" height="120" rx="10" fill="url(#cardGrad2)" stroke="#7C3AED" stroke-width="0.5" stroke-opacity="0.3" />
    <rect x="680" y="220" width="4" height="120" rx="2" fill="url(#accent1)" />
    <text x="700" y="252" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="15" font-weight="600">Performance</text>
    <text x="700" y="274" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">Bug fixes, optimization, stability</text>
    <text x="700" y="292" fill="#64748B" font-family="system-ui, sans-serif" font-size="11">Profiling · Crash reduction</text>
    <circle cx="930" cy="238" r="3" fill="#22D3EE" opacity="0.6" />
  </g>

  <!-- Footer accent line -->
  <rect x="30" y="370" width="940" height="1" rx="0.5" fill="#334155" />

  <!-- Bottom text -->
  <text x="500" y="400" text-anchor="middle" fill="#64748B" font-family="system-ui, sans-serif" font-size="11">Flutter · Dart · Firebase · Riverpod · Node.js</text>

  <!-- Decorative corner accents -->
  <circle cx="970" cy="495" r="80" fill="url(#accent1)" opacity="0.03" />
  <circle cx="30" cy="495" r="60" fill="url(#accent2)" opacity="0.03" />
</svg>
