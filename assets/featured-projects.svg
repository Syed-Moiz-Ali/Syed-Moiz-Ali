    <text x="670" y="399" text-anchor="middle" fill="#67E8F9" font-family="system-ui, sans-serif" font-size="10" font-weight="500">UI</text>
    <a href="https://github.com/Syed-Moiz-Ali/flockui">
      <rect x="865" y="450" width="90" height="16" rx="8" fill="none" stroke="#7C3AED" stroke-width="0.5" stroke-opacity="0.5" />
      <text x="910" y="462" text-anchor="middle" fill="#7C3AED" font-family="system-ui, sans-serif" font-size="10">View →</text>
