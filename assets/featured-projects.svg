    <text x="132" y="399" text-anchor="middle" fill="#A78BFA" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Dart</text>
    <rect x="159" y="385" width="52" height="20" rx="4" fill="url(#chipGrad2)" />
    <text x="185" y="399" text-anchor="middle" fill="#67E8F9" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Hive</text>
    <a href="https://github.com/Syed-Moiz-Ali/KiranaInventoryTracker">
