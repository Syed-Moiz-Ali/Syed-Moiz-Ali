      <rect x="865" y="240" width="90" height="16" rx="8" fill="none" stroke="#7C3AED" stroke-width="0.5" stroke-opacity="0.5" />
      <text x="910" y="252" text-anchor="middle" fill="#7C3AED" font-family="system-ui, sans-serif" font-size="10">View →</text>
