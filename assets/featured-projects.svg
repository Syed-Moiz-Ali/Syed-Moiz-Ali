    <rect x="515" y="290" width="3" height="185" rx="1.5" fill="url(#accent2)" />
    <text x="535" y="325" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="16" font-weight="600">flockui</text>
    <text x="535" y="350" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">Flutter UI component and reusable</text>
    <text x="535" y="367" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">interface work and contributions.</text>
    <rect x="535" y="385" width="55" height="20" rx="4" fill="url(#chipGrad1)" />
    <text x="562" y="399" text-anchor="middle" fill="#A78BFA" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Flutter</text>
    <rect x="597" y="385" width="40" height="20" rx="4" fill="url(#chipGrad1)" />
    <text x="617" y="399" text-anchor="middle" fill="#A78BFA" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Dart</text>
