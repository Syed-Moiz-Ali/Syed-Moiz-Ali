    <linearGradient id="chipGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.1" />
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#7C3AED" flood-opacity="0.12" />
    </filter>
  </defs>

