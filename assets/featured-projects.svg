    <text x="186" y="189" text-anchor="middle" fill="#67E8F9" font-family="system-ui, sans-serif" font-size="10" font-weight="500">Riverpod</text>
    <a href="https://github.com/Syed-Moiz-Ali/nullfeed-flutter">
      <rect x="380" y="240" width="90" height="16" rx="8" fill="none" stroke="#7C3AED" stroke-width="0.5" stroke-opacity="0.5" />
      <text x="425" y="252" text-anchor="middle" fill="#7C3AED" font-family="system-ui, sans-serif" font-size="10">View →</text>
    </a>
  </g>

