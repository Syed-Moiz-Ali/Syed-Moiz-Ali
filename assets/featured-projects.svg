    <line x1="250" y1="0" x2="250" y2="520" stroke="#6366F1" stroke-width="0.5" />
    <line x1="375" y1="0" x2="375" y2="520" stroke="#6366F1" stroke-width="0.5" />
    <line x1="500" y1="0" x2="500" y2="520" stroke="#6366F1" stroke-width="0.5" />
    <line x1="625" y1="0" x2="625" y2="520" stroke="#6366F1" stroke-width="0.5" />
    <line x1="750" y1="0" x2="750" y2="520" stroke="#6366F1" stroke-width="0.5" />
    <line x1="875" y1="0" x2="875" y2="520" stroke="#6366F1" stroke-width="0.5" />
    <line x1="1000" y1="0" x2="1000" y2="520" stroke="#6366F1" stroke-width="0.5" />
    <line x1="0" y1="0" x2="1000" y2="0" stroke="#6366F1" stroke-width="0.5" />
    <line x1="0" y1="130" x2="1000" y2="130" stroke="#6366F1" stroke-width="0.5" />
    <line x1="0" y1="260" x2="1000" y2="260" stroke="#6366F1" stroke-width="0.5" />
