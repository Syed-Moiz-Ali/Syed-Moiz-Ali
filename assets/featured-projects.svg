    <rect x="30" y="80" width="3" height="185" rx="1.5" fill="url(#accent1)" />
    <text x="50" y="115" fill="#E2E8F0" font-family="system-ui, sans-serif" font-size="16" font-weight="600">nullfeed-flutter</text>
    <text x="50" y="140" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">Flutter contributions focused on bug fixes,</text>
    <text x="50" y="157" fill="#94A3B8" font-family="system-ui, sans-serif" font-size="12">performance, and state handling.</text>
    <!-- Tech chips -->
